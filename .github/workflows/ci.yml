name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest pytest-cov pytest-asyncio
        pip install -e mcp-server/

    - name: Lint with ruff
      run: |
        ruff check . --output-format=github
        ruff format --check .

    - name: Test skill execution
      run: |
        # Test each skill with fixtures
        for skill in skills/*/; do
          if [ -d "$skill/scripts" ]; then
            echo "Testing $skill"
            python3 "$skill/scripts/"*.py --input skills/_fixtures/sample_input.json || true
          fi
        done

    - name: Test data adapter
      run: |
        python test_data_adapter.py

    - name: Test MCP server
      run: |
        python -m pytest tests/ -v --cov=mcp-server --cov-report=xml
      continue-on-error: true

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -f mcp-server/Dockerfile -t stock-buddy-mcp:test .

    - name: Test Docker image
      run: |
        docker run --rm stock-buddy-mcp:test python -c "import stock_buddy_mcp"

  validate-skills:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Validate skill metadata
      run: |
        for skill in skills/*/SKILL.md; do
          echo "Validating $skill"
          # Check SKILL.md has required fields
          grep -q "name:" "$skill" || exit 1
          grep -q "description:" "$skill" || exit 1
          grep -q "license:" "$skill" || exit 1
        done

    - name: Check fixture files
      run: |
        test -f skills/_fixtures/sample_input.json || exit 1